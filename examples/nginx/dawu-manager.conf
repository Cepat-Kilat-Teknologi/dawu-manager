# dawu-manager — nginx reverse proxy with HTTPS
#
# Replace dawu.example.com with your actual domain.
# Use certbot for automatic Let's Encrypt SSL:
#   sudo certbot --nginx -d dawu.example.com

upstream dawu_backend {
    server 127.0.0.1:3789;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dawu.example.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dawu.example.com;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/dawu.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dawu.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (dawu-manager also sets these; nginx layer is defense-in-depth)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy settings
    location / {
        proxy_pass http://dawu_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for SSE streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;  # SSE streams need longer read timeout

        # Buffering off for SSE
        proxy_buffering off;
        proxy_cache off;
    }

    # Static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://dawu_backend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Client body size (for config uploads)
    client_max_body_size 10M;

    # Access log
    access_log /var/log/nginx/dawu-manager.access.log;
    error_log  /var/log/nginx/dawu-manager.error.log;
}
