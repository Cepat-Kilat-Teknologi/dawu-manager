# dawu-manager — nginx reverse proxy (HTTP only)
#
# For internal networks where HTTPS is not required.
# Replace dawu.example.com with your hostname or IP.

upstream dawu_backend {
    server 127.0.0.1:3789;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name dawu.example.com;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://dawu_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering off;
        proxy_cache off;
    }

    location /_next/static/ {
        proxy_pass http://dawu_backend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    client_max_body_size 10M;

    access_log /var/log/nginx/dawu-manager.access.log;
    error_log  /var/log/nginx/dawu-manager.error.log;
}
